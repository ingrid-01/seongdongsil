<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="성장동력실은 카톡오픈채팅방을 통해 활발하게 교류하는 2030 커뮤니티입니다. 공부, 운동, 독서, 취미 등 다양한 활동을 격력하며 혼자서는 하기 쉽지 않은 일을 함께 그리고 같이 해나가는 모임입니다."
    />
    <meta name="author" content="Ingrid Koh" />
    <title>나의 학습 유형은?</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="lsquiz.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="favicon.ico" />
  </head>

  <body>
    <main id="quiz-app">
      <!-- Screen 1: Intro -->
      <section id="screen-intro" class="screen active">
        <div class="quiz-container">
          <a href="index.html" class="logo">
            <img src="illust-hero.png" alt="성장동력실 로고" />
          </a>
          <p class="screen-label">성장동력실 x 학습 유형</p>
          <img
            class="intro-illustration"
            src="lsquiz-illustrations/main-page.png"
            alt="Intro Illustration"
          />
          <h1>나는 어떤 학습자인가?</h1>
          <p class="intro-desc">
            같은 내용을 배워도 사람마다 배우는 방식은 다릅니다.<br />
            이 퀴즈를 통해 나의 학습 유형을 발견해 보세요!
          </p>
          <p class="intro-meta">
            허니 &amp; 맘포드 (Honey &amp; Mumford) 학습 유형 이론 기반 · 약 5분
            소요
          </p>
          <button class="btn-primary" id="btn-start">시작하기</button>
        </div>
      </section>

      <!-- Screen 2: Quiz -->
      <section id="screen-quiz" class="screen">
        <div class="quiz-container">
          <div class="progress-wrap">
            <div class="progress-bar" id="progress-bar"></div>
          </div>

          <div id="question-illustration"></div>

          <p class="question-meta" id="question-meta">질문 1 / 20</p>
          <h2 class="question-text" id="question-text"></h2>
          <div class="options" id="options"></div>

          <div class="nav-buttons">
            <button class="btn-prev" id="btn-prev">⬅ 이전</button>
            <button class="btn-next" id="btn-next" disabled>다음 ➡</button>
          </div>
        </div>
      </section>

      <!-- Screen 3: Result -->
      <section id="screen-result" class="screen">
        <div class="quiz-container">
          <p class="screen-label">나의 학습 유형</p>
          <div id="result-illustration-wrap"></div>
          <h2 class="result-type" id="result-type"></h2>
          <p class="result-tagline" id="result-tagline"></p>
          <div class="result-body" id="result-body"></div>
          <button class="btn-secondary" id="btn-retry">다시 테스트하기</button>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 성장동력실. All rights reserved.</p>
    </footer>
    <script src="lsquiz.js"></script>
  </body>
</html>
