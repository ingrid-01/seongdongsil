<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="성장동력실은 카톡오픈채팅방을 통해 활발하게 교류하는 2030 커뮤니티입니다. 공부, 운동, 독서, 취미 등 다양한 활동을 격력하며 혼자서는 하기 쉽지 않은 일을 함께 그리고 같이 해나가는 모임입니다."
    />
    <meta name="author" content="Ingrid Koh" />
    <title>성장동력실!</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="events.css" />
  </head>
  <body>
    <header>
      <a href="index.html" class="logo">
        <img src="illust-hero.png" alt="성장동력실 로고" />
      </a>
      <nav>
        <ul>
          <li><a href="index.html">홈</a></li>
          <li><a href="who-we-are.html">소개</a></li>
          <li><a href="study-space.html">공간</a></li>
          <li><a href="tools.html">도구</a></li>
          <li><a href="events.html">일정</a></li>
          <li><a href="contact.html">문의</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h2>일정</h2>

      <div id="filter-bar">
        <button id="filter-all" class="filter-btn active">ALL</button>

        <select id="filter-month">
          <option value="">--월 선택--</option>
        </select>

        <select id="filter-type">
          <option value="">--모임 유형 선택--</option>
          <option value="스터디벙">스터디벙</option>  
          <option value="운동벙">운동벙</option>
          <option value="놀벙">놀벙</option>
          <option value="정모">정모</option>
          <option value="외부프로그램">외부프로그램</option>
        </select>

        <select id="filter-area">
          <option value="">--지역 선택--</option>
          <option value="의왕">의왕</option>
          <option value="안양">안양</option>
          <option value="군포">군포</option>
          <option value="산본">산본</option>
          <option value="기타">기타</option>
        </select>

        <button id="add-event">일정 추가 +</button>
      </div>
      
      <div id="events"></div>

      <!-- Detail view - hidden by default -->
       <div id="detail-view" class="hidden">
        <button id="back-btn">← 목록으로</button>
        <div id="detail-content"></div>
       </div>

      <!-- Modal Overlay -->
      <div id="modal-overlay" class="hidden">
        <div id="modal">
          <h3>새 일정 추가</h3>
          <form id="event-form">
            <label for="event-category">카테고리</label>
            <select id="event-category" required>
              <option value="">--선택해주세요--</option>
              <option value="스터디벙">스터디벙</option>
              <option value="운동벙">운동벙</option>
              <option value="놀벙">놀벙</option>
              <option value="정모">정모</option>
              <option value="외부프로그램">외부프로그램</option>
            </select>

            <!-- Only show if 스터디벙 is selected -->
            <div id="sub-category-group" class="hidden">
              <label for="event-sub">스터디 유형</label>
              <select id="event-sub">
                <option value="">--선택해주세요--</option>
                <option value="열공">열공</option>
                <option value="반공">반공</option>
                <option value="디코벙">디코벙</option>
              </select>
            </div>

            <label for="event-region">지역</label>
            <select id="event-region" required>
              <option value="">--선택해주세요--</option>
              <option value="의왕">의왕</option>
              <option value="안양">안양</option>
              <option value="군포">군포</option>
              <option value="산본">산본</option>
              <option value="기타">기타</option>
            </select>

            <label for="event-title">제목</label>
            <input
              type="text"
              id="event-title"
              required
              placeholder="일정 제목을 입력해주세요"
            />

            <label for="event-date">날짜</label>
            <input type="date" id="event-date" required />

            <label for="event-start">시작 시간</label>
            <input type="time" id="event-start" required />

            <label for="event-end">종료 시간</label>
            <input type="time" id="event-end" required />

            <label for="event-location">장소</label>
            <input
              type="text"
              id="event-location"
              required
              placeholder="일정 장소를 입력해주세요"
            />

            <div id="optional-details">
              <p>추가 정보 (선택사항)</p>

              <label for="event-description">상세 설명</label>
              <textarea id="event-description" placeholder="이벤트에 대한 상세 설명을 입력해주세요"></textarea>

              <label for="event-link">관련 링크</label>
              <input type="url" id="event-link" placeholder=""https://example.com" />
              <button type="button" id="add-link-btn">링크 추가 +</button>
              <ul id="links-list"></ul>
            </div>

            <div class="form-buttons">
              <button type="submit">저장</button>
              <button type="button" id="cancel-btn">취소</button>
            </div>
          </form>
        </div>
      </div>
    </main>
    <script src="events.js"></script>
  </body>
</html>
